name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          python -m pip check

      - name: Ruff lint
        run: ruff check src config scripts dashboard tests

      - name: Black format check
        run: black --check src config scripts dashboard tests

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Encoding check
        run: python scripts/check_encoding.py

      - name: Streamlit Cloud preflight
        run: python scripts/streamlit_cloud_preflight.py

      - name: Data provenance check
        run: python scripts/validate_data_provenance.py

      - name: Data manifest check
        run: python scripts/generate_data_manifest.py --check

      - name: Secret scan
        run: python scripts/check_secrets.py
